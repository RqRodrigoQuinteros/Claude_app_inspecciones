<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Sanidad PWA</title>
    <style>
    /* Variables y Reset */
    :root { 
        --bg: #0f172a; --surface: #1e293b; --accent: #3b82f6; --text: #f1f5f9; 
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 80px; }
    
    /* Header Fijo */
    header { 
        position: sticky; top: 0; background: var(--surface); padding: 15px; 
        display: flex; justify-content: space-between; border-bottom: 1px solid #334155; z-index: 100;
    }

    /* Navegación por Chips (Secciones) */
    .tabs-container { 
        display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: var(--bg); 
    }
    .chip { 
        padding: 8px 16px; background: var(--surface); border-radius: 20px; 
        font-size: 14px; white-space: nowrap; border: 1px solid #334155;
    }
    .chip.active { background: var(--accent); border-color: var(--accent); }

    /* Contenedor de Formularios */
    .form-step { display: none; padding: 20px; animation: fadeIn 0.3s; }
    .form-step.active { display: block; }

    /* Footer de Navegación */
    footer { 
        position: fixed; bottom: 0; width: 100%; background: var(--surface); 
        padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155;
    }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>

<body>
    <header>
        <span id="brand">SANIDAD <b>PRO</b></span>
        <div id="net-indicator" class="status-dot"></div>
    </header>

    <div class="tabs-container" id="tabs">
        <div class="chip active" onclick="showStep(0)">Gral</div>
        <div class="chip" onclick="showStep(1)">D.T.</div>
        <div class="chip" onclick="showStep(2)">Registros</div>
        <div class="chip" onclick="showStep(3)">Firma</div>
    </div>

    <div id="step-0" class="form-step active">
        <h3>Datos Generales</h3>
        <input type="text" id="nro_exp" placeholder="N° Expediente">
        <input type="text" id="estab" placeholder="Establecimiento">
        <select id="tipologia">
            <option value="CLINICA">CLINICA</option>
            <option value="OPTICA">OPTICA</option>
        </select>
    </div>

    <div id="step-1" class="form-step">
        <h3>Director Técnico</h3>
        <input type="text" id="dt_nombre" placeholder="Nombre completo">
        <input type="number" id="dt_dni" placeholder="DNI">
        <label>¿Presente?</label>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="setVal('dt_pres','SI')" class="btn-sn">SI</button>
            <button onclick="setVal('dt_pres','NO')" class="btn-sn" style="background:#ef4444">NO</button>
        </div>
    </div>

    <div id="step-3" class="form-step">
        <h3>Finalizar</h3>
        <div id="signature-pad" style="width:100%; height:200px; background:white; border-radius:8px;"></div>
        <button onclick="enviarFinal()" style="margin-top:20px;">GUARDAR E INSPECCIONAR</button>
    </div>

    <footer>
        <button onclick="prevStep()" style="background:#475569">Anterior</button>
        <button onclick="nextStep()">Siguiente</button>
    </footer>

    <script>
        let currentStep = 0;
        const totalSteps = 4;

        function showStep(n) {
            document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            
            document.getElementById(`step-${n}`).classList.add('active');
            document.querySelectorAll('.chip')[n].classList.add('active');
            currentStep = n;
            window.scrollTo(0,0);
        }

        function nextStep() { if(currentStep < totalSteps-1) showStep(currentStep + 1); }
        function prevStep() { if(currentStep > 0) showStep(currentStep - 1); }
        if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Service Worker Activo"));
}
    </script>
</body>
</html>
