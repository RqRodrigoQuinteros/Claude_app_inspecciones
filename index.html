<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inspecciones">
  <meta name="theme-color" content="#0c1322">
  <title>Inspecciones Sanitarias</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- Loading -->
<div id="overlay">
  <div class="spinner"></div>
  <span id="loading-msg">Cargando...</span>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Header -->
<header id="header" class="hidden">
  <div class="hdr-l">
    <button class="hdr-btn hidden" id="btn-back">← Volver</button>
    <span id="hdr-title">Inspecciones</span>
  </div>
  <div class="hdr-r">
    <span class="dot offline" id="conn-dot"></span>
    <div class="sync-wrap">
      <button class="hdr-btn" id="btn-sync">⇅</button>
      <span class="hidden" id="sync-badge">0</span>
    </div>
    <button class="hdr-btn primary hidden" id="btn-save">Guardar</button>
    <button class="hdr-btn" id="btn-logout">Salir</button>
  </div>
</header>

<div id="screens">

  <!-- ══ LOGIN ══ -->
  <div class="screen active" id="scr-login">
    <div class="login-wrap">
      <div class="login-brand">
        <div class="login-ico">📋</div>
        <h1 class="login-title">Inspecciones<br><b>Sanitarias</b></h1>
        <p class="login-sub">Ministerio de Salud · Córdoba</p>
      </div>
      <div class="login-card">
        <div class="fg">
          <label class="lbl">Inspector</label>
          <select class="sel" id="sel-insp">
            <option value="">— Seleccioná —</option>
          </select>
        </div>
        <div class="fg">
          <label class="lbl">DNI</label>
          <input type="number" inputmode="numeric" class="inp" id="inp-dni" placeholder="Sin puntos">
        </div>
        <button class="btn" id="btn-login">Ingresar</button>
      </div>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div class="screen" id="scr-dashboard">
    <div class="dash-body">

      <!-- Sync pendientes -->
      <div class="sync-row hidden" id="sync-row">
        <span>🔄 <span id="sync-msg"></span></span>
        <button id="btn-sync-now">Sincronizar</button>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-tile"><span class="stat-n" id="stat-t">0</span><span class="stat-l">Total</span></div>
        <div class="stat-tile"><span class="stat-n" id="stat-b">0</span><span class="stat-l">Borradores</span></div>
        <div class="stat-tile"><span class="stat-n" id="stat-g">0</span><span class="stat-l">Generadas</span></div>
      </div>

      <!-- Búsqueda -->
      <div class="search-row">
        <input class="search-inp" id="inp-buscar" placeholder="🔍 Buscar...">
        <select class="search-sel" id="sel-estado">
          <option value="">Todos</option>
          <option value="Borrador">Borrador</option>
          <option value="Generada">Generada</option>
        </select>
      </div>

      <!-- Lista -->
      <div class="insp-list" id="insp-list"></div>
      <div class="empty hidden" id="empty-state">
        <span class="empty-ico">📄</span>
        <p>Sin inspecciones.<br>Tocá + para crear una.</p>
      </div>

    </div>
    <button class="fab" id="btn-nueva">+</button>
  </div>

  <!-- ══ NUEVA INSPECCIÓN ══ -->
  <div class="screen" id="scr-nueva">
    <div class="page-body">
      <p class="page-title">Nueva Inspección</p>
      <div class="fg">
        <label class="lbl">Tipología</label>
        <select class="sel" id="sel-tip"><option value="">— Seleccioná —</option></select>
      </div>
      <div class="fg">
        <label class="lbl">Establecimiento</label>
        <input type="text" class="inp" id="inp-estab" placeholder="Nombre del establecimiento">
      </div>
      <div class="fg">
        <label class="lbl">Localidad</label>
        <input type="text" class="inp" id="inp-localidad" placeholder="Ciudad o localidad">
      </div>
      <div class="fg">
        <label class="lbl">N° Expediente</label>
        <input type="text" class="inp" id="inp-exp" placeholder="Número de expediente">
      </div>
      <br>
      <button class="btn" id="btn-crear">Continuar al formulario →</button>
    </div>
  </div>

  <!-- ══ FORMULARIO ══ -->
  <div class="screen" id="scr-form">
    <div class="chips-bar">
      <div class="chips-scroll" id="chips"></div>
    </div>
    <div class="form-body" id="form-body"></div>
    <div class="form-footer">
      <button class="nav-btn" id="btn-prev" disabled>← Anterior</button>
      <span class="form-pg" id="form-pg">1 / 1</span>
      <button class="nav-btn fwd" id="btn-next">Siguiente →</button>
    </div>
  </div>

  <!-- ══ DETALLE ══ -->
  <div class="screen" id="scr-detalle">
    <div class="det-body">
      <div class="det-hdr">
        <div class="det-nombre" id="det-nombre"></div>
        <div class="det-meta"   id="det-meta"></div>
        <div class="det-exp"    id="det-exp"></div>
        <div class="det-badge"  id="det-badge"></div>
        <div class="det-resumen" id="det-resumen"></div>
      </div>

      <div class="det-actions">
        <button id="btn-editar">✏️ Editar formulario</button>
        <button class="primary" id="btn-generar">📄 Generar Acta</button>
      </div>

      <div class="doc-box hidden" id="doc-box">
        <a href="#" target="_blank" id="doc-link">📄 Abrir Acta en Google Docs →</a>
      </div>
    </div>
  </div>

</div><!-- /screens -->

<script type="module" src="js/app.js"></script>
</body>
</html>
